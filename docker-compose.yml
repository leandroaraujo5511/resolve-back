services:
  postgres:
    image: postgres:16-alpine
    container_name: resolve-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resolve
    volumes:
      - resolve_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d resolve']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  resolve_pgdata:
